name: Release

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_matrix:
        description: "Forzar regeneración de la matriz"
        required: false
        default: "false"

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_items: ${{ steps.check.outputs.has_items }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate matrix
        id: set-matrix
        run: |
          FORCE_ARG=""
          if [ "${{ github.event.inputs.force_matrix }}" = "true" ]; then
            FORCE_ARG="--force"
          fi

          MATRIX=$(./main.py --matrix $FORCE_ARG)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Check if matrix has items
        id: check
        run: |
          COUNT=$(echo '${{ steps.set-matrix.outputs.matrix }}' | jq '.include | length')
          if [ "$COUNT" -gt 0 ]; then
            echo "has_items=true" >> $GITHUB_OUTPUT
          else
            echo "has_items=false" >> $GITHUB_OUTPUT
          fi

  build-images:
    needs: generate-matrix
    if: needs.generate-matrix.outputs.has_items == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: ./main.py --build-images

  handle-kernel:
    needs: [generate-matrix, build-images]
    if: needs.generate-matrix.outputs.has_items == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          echo "Setting SSH key for AUR..."
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo -e "Host aur.archlinux.org\n\tIdentityFile ~/.ssh/aur\n\tUser aur\n\tStrictHostKeyChecking no" >> ~/.ssh/config

          PYTHONUNBUFFERED=1 ./main.py ${{ matrix.kernel }} ${{ matrix.version }}
